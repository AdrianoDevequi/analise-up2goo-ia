<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="92" fill="#2563eb"/>

  <!-- Axis -->
  <line x1="112" y1="100" x2="112" y2="400" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="112" y1="400" x2="412" y2="400" stroke="white" stroke-width="10" stroke-linecap="round"/>

  <!-- Bars -->
  <rect x="140" y="280" width="50" height="120" rx="8" fill="#93c5fd"/>
  <rect x="210" y="220" width="50" height="180" rx="8" fill="#93c5fd"/>
  <rect x="280" y="240" width="50" height="160" rx="8" fill="#93c5fd"/>
  <rect x="350" y="150" width="50" height="250" rx="8" fill="white"/>

  <!-- Trend line -->
  <polyline points="165,260 235,200 305,220 375,130" fill="none" stroke="#fbbf24" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dots -->
  <circle cx="165" cy="260" r="12" fill="#fbbf24"/>
  <circle cx="235" cy="200" r="12" fill="#fbbf24"/>
  <circle cx="305" cy="220" r="12" fill="#fbbf24"/>
  <circle cx="375" cy="130" r="12" fill="#fbbf24"/>

  <!-- Arrow up -->
  <polygon points="375,90 360,115 390,115" fill="#fbbf24"/>
</svg>
