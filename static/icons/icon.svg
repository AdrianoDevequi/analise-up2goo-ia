<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Arrow up (growth) -->
  <path d="M130 340 L256 180 L382 260" fill="none" stroke="#60a5fa" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  <path d="M130 340 L256 180 L382 260" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Rocket tip -->
  <g transform="translate(382,260) rotate(-35)">
    <path d="M0,-8 L20,-8 L20,8 L0,8 Z" fill="white" rx="3"/>
    <polygon points="20,-12 36,0 20,12" fill="#fbbf24"/>
    <rect x="-6" y="-12" width="6" height="24" rx="2" fill="#60a5fa"/>
  </g>

  <!-- Text "UP" -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="100" fill="white" letter-spacing="8">UP</text>

  <!-- Magnifying glass (SEO) -->
  <g transform="translate(120,100)">
    <circle cx="28" cy="28" r="20" fill="none" stroke="#fbbf24" stroke-width="7"/>
    <line x1="42" y1="42" x2="58" y2="58" stroke="#fbbf24" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
